<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account | Stackly</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      position: relative;
      overflow: hidden;
    }
    .auth-page .shape { position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0.1; }
    .auth-page .shape-1 { width: 500px; height: 500px; background: #0ea5e9; top: -150px; right: -100px; }
    .auth-page .shape-2 { width: 350px; height: 350px; background: #06b6d4; bottom: -80px; left: -80px; }

    .auth-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%;
      max-width: 480px;
      position: relative;
      z-index: 1;
      box-shadow: var(--shadow);
    }
    .auth-logo { text-align: center; margin-bottom: 32px; }
    .auth-logo img { height: 44px; width: auto; filter: drop-shadow(0 0 8px rgba(14,165,233,0.45)); }
    .auth-title { font-family: 'Space Grotesk', sans-serif; font-size: 28px; font-weight: 700; color: #fff; text-align: center; margin-bottom: 8px; }
    .auth-sub { color: var(--text-muted); text-align: center; margin-bottom: 28px; font-size: 15px; }

    .role-tabs { display: flex; gap: 8px; margin-bottom: 28px; background: rgba(255,255,255,0.04); padding: 6px; border-radius: 12px; }
    .role-tab {
      flex: 1; padding: 10px; text-align: center; border-radius: 8px;
      color: var(--text-muted); font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s;
    }
    .role-tab.active { background: var(--gradient); color: #fff; }

    .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
    .form-group input, .form-group select {
      width: 100%; padding: 13px 16px;
      background: rgba(255,255,255,0.05); border: 1px solid var(--border);
      border-radius: 12px; color: var(--text); font-size: 15px;
      font-family: 'Inter', sans-serif; transition: border-color 0.2s; outline: none;
    }
    .form-group select option { background: #1e293b; color: var(--text); }
    .form-group input:focus, .form-group select:focus { border-color: var(--primary); background: rgba(14,165,233,0.06); }
    .form-group input::placeholder { color: var(--text-muted); }

    .terms { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 24px; font-size: 13px; color: var(--text-muted); }
    .terms input[type="checkbox"] { accent-color: var(--primary); width: 16px; height: 16px; flex-shrink: 0; margin-top: 2px; }
    .terms a { color: var(--primary); text-decoration: none; }

    .btn-auth {
      width: 100%; padding: 14px;
      background: var(--gradient); border: none; border-radius: 12px;
      color: #fff; font-size: 16px; font-weight: 700;
      font-family: 'Inter', sans-serif; cursor: pointer;
      box-shadow: 0 8px 24px rgba(14,165,233,0.35); transition: all 0.2s; margin-bottom: 20px;
    }
    .btn-auth:hover { opacity: 0.9; transform: translateY(-1px); }

    .auth-footer { text-align: center; font-size: 14px; color: var(--text-muted); }
    .auth-footer a { color: var(--primary); font-weight: 600; text-decoration: none; }
    .auth-footer a:hover { text-decoration: underline; }

    .back-home { position: fixed; top: 20px; left: 24px; display: flex; align-items: center; gap: 8px; color: var(--text-muted); text-decoration: none; font-size: 14px; font-weight: 600; z-index: 10; transition: color 0.2s; }
    .back-home:hover { color: var(--primary); }

    @media (max-width: 520px) { .auth-card { padding: 32px 20px; } .form-row-2 { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <a href="index.html" class="back-home"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
  <div class="auth-page">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="auth-card">
      <div class="auth-logo"><a href="index.html"><img src="assets/images/logo.webp" alt="Stackly" /></a></div>
      <h1 class="auth-title">Create Your Account</h1>
      <p class="auth-sub">Join 2 million+ professionals on Stackly</p>

      <div class="role-tabs">
        <div class="role-tab active" onclick="setRole('seeker',this)"><i class="fa-solid fa-user"></i> Job Seeker</div>
        <div class="role-tab" onclick="setRole('employer',this)"><i class="fa-solid fa-building"></i> Employer</div>
      </div>

      <div class="form-row-2">
        <div class="form-group"><label>First Name</label><input type="text" placeholder="John" /></div>
        <div class="form-group"><label>Last Name</label><input type="text" placeholder="Doe" /></div>
      </div>
      <div class="form-group"><label>Email Address</label><input type="email" placeholder="you@example.com" /></div>
      <div class="form-group" id="company-field" style="display:none;"><label>Company Name</label><input type="text" placeholder="Your company" /></div>
      <div class="form-group">
        <label>Industry</label>
        <select>
          <option value="">Select your industry</option>
          <option>Technology</option><option>Finance</option><option>Healthcare</option>
          <option>Design & Creative</option><option>Marketing</option><option>Education</option>
          <option>Logistics</option><option>Legal</option><option>Other</option>
        </select>
      </div>
      <div class="form-group"><label>Password</label><input type="password" placeholder="Create a strong password" /></div>

      <div class="terms">
        <input type="checkbox" id="agree" />
        <label for="agree">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
      </div>

      <button class="btn-auth" onclick="handleRegister()">
        <i class="fa-solid fa-user-plus"></i> Create Free Account
      </button>
      <div class="auth-footer">Already have an account? <a href="signin.html">Sign in</a></div>
    </div>
  </div>
  <script>
    function setRole(role, el) {
      document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      document.getElementById('company-field').style.display = role === 'employer' ? 'block' : 'none';
    }
    function handleRegister() {
      if (!document.getElementById('agree').checked) {
        alert('Please agree to the Terms of Service.');
        return;
      }
      // Get first name from the form
      const firstNameInput = document.querySelectorAll('.form-group input[type="text"]')[0];
      let name = firstNameInput ? firstNameInput.value.trim() : '';
      if (!name) name = 'Friend';
      localStorage.setItem('stackly_user_name', name);
      window.location.href = 'register-success.html?name=' + encodeURIComponent(name);
    }
  </script>
</body>
</html>
